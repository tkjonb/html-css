<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Testando videos hospedados localmente com html5</h1>
    <p>Esse video esta hospedado no meu propio servidor</p>
    <video width="700" poster="imagens/1348376.png" controls> 
        <source src="midia/meu-video.mp4" type="video/mp4">
        <source src="midia/ meu-video-Mod.mp4" type="video/mp4">
        <source src="midia/meu-video-mod2.mp4" type="video/mp4">
        <!--Importante criar sempre varios tipos de video, do mais leve pro mais pesado-->
        <p>seu navegador não é compativel com os videos</p>

    </video>
    <h1>Inserindo videos do YouTube</h1>
    <p>Esse video esta hospedado no servidor do YouTube</p>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/lDzXBSxAxKw?si=YRmlLAtRPRTKGyir" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</html>
