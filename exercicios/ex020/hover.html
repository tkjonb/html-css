<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover exemplo</title>
    <style>
      body{
        font-family: 'Courier New', Courier, monospace;
      }
      div > p{
        display: none;
      }
      div:hover > p{
        display:block;
        color: greenyellow;
      }
      div:hover{
        color: brown;

      }
    </style>
</head>
<body>
    <h1>Passe o mouse no texto abaixo</h1>
    <div>Passe o mouse aqui
        <p>texto escondido</p>
    </div>
    <p>Fim do exemplo</p>
    
</body>
</html>
