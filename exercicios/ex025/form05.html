<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <style>
        body{
            background-color: aliceblue;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Formulario</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Sexo</legend>
            <input type="radio" name="sexo" id="isxmas" value="mas"><label for="isexmas">Masculino</label>
            <input type="radio" name="sexo" id="isxfem" value="fem"><label for="isxfem">Feminino</label>
        </fieldset>
        <fieldset>
            <legend>Esportes favoritos</legend>
            <label for="esfut"><input type="checkbox" name="esfut" id="esfut"> Futebol <br></label>
            
            <label for="esbase"><input type="checkbox" name="esbase" id="esbase"> Basebol <br></label>
            
            <label for="estenis"><input type="checkbox" name="estenis" id="estenis"> Tenis <br></label>
            
            <label for="esbasket"> <input type="checkbox" name="esbasket" id="esbasket"> Basket</label>
            
        </fieldset>

        <p>
            <input type="submit" value="submit">
            <input type="reset" value="reset">
        </p>
    </form>
</body>
</html>
