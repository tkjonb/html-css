<!DOCTYPE html>
<html lang="pt-br">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family:'Showpop';
            src: url('Showpop.otf') format(opentype), url('Showpop.ttf') format(truetype);
            font-weight: normal;
            font-style: normal;
            /*tipos de formatos:
            opentype:otf
            truetype:ttf
            embedded-opentype
            truetype-aat
            svg
            */
        }
        body{
            font-family: 'Showpop', sans-serif;
            font-weight: normal;
        }
        h1{
            font-family: 'Showpop', sans-serif;
            font-weight: normal;
        }
    </style>
</head>
