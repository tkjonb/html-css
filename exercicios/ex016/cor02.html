<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cor Gradiente em CSS</title>
    <style>
        h1{
            color: #F5CF0A;
            
        }
        *{ /* configurações globais da CSS*/
            height: 100%;
        }
        body {
            background-image: linear-gradient(180deg, #1409F5, #2D2D33);
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando gradiente</h1>
    
</body>
</html>
