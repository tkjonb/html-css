<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>tente abrir essa imagem em diversos dispositivos diferentes ou mude o tamanho do navegador.</p>
    <picture>
        <source media="(max-width:750px )" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexivel">
    </picture>
    <h1>reproduzindo audio</h1>
    <p>vamos aprender a reproduzir audios em HTML5</p>
    <audio src="midia/inter.mp3" controls autoplay></audio>
    <!--MP3  WAV  OGG-->
    <audio preload="metadata" autoplay controls loop> 
        <source src="midia/inter.mp3" type="audio/mpeg">
        <source src="midia/inter.wav" type="audio/wav">
        <source src="midia/inter.ogg" type="audio/ogg">
        <!--Basicamente a ordem influencia em qual arquivo vai ter a prioridade para o navegador, se o mp3 não rodar, o navegador deve tentar o de baixo e assim sucessivamente.-->
        <p>Infelizente seu navegador não conseguiu reproduzir este aúdio. <a href="midia/inter.mp3">Clique aqui </a>para fazer o download do arquivo MP3.</p>
        

    </audio>

     
</body>
</html>
