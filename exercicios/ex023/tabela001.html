<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela001</title>
    <style>
        body{
            background-color: aliceblue;
            font-family: Arial, Helvetica, sans-serif;
        }
        table{
            width: 400px;
            height: 400px;
            border-collapse: collapse;
        }
        td{
            border: 1px solid black;
            padding: 8px;
            text-align: center;
            vertical-align: bottom;
        }
        .numero{
            text-align: right;
        }
    </style>
</head>
<body>
    <!--
    Hierarquia das Tabelas Simples em HTML5
        TABLE=Tabela
            TABLE ROW= linha de tabela
                TABLE HEADER= cabeçalho de tabela
                    TABLE DATA= Dado de tabela
    -->
    <h1>Minha primeira tabela!</h1>
    <table>
        <tr><!--primeira linha-->
            <td>a1</td>
            <td>b1</td>
            <td>c1</td>
        </tr>
        <tr> <!--segunda linha-->
            <td>a2</td>
            <td>b2</td>
            <td>c2</td>
        </tr>
        <tr> <!--terceira linha-->
            <td class="numero">33</td>
            <td>b3</td>
            <td class="numero">33</td>
        </tr>
        <tr><!--quarta linha-->
            <td>a4</td>
            <td>b4</td>
            <td>c4</td>
        </tr>
    </table>
</body>
</html>
